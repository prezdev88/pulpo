<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulpo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <main>
            <!-- Vista 1: Landing -->
            <div class="landing-card" id="landing-card">
                <img src="../../assets/logo.png" alt="Pulpo Logo" style="width: 380px; height: auto; margin-bottom: 1.5rem; border-radius: 10px; display: block; margin-left: auto; margin-right: auto;">
                <button id="open-repo-btn" class="primary-btn">Open Local Repository</button>
                <div id="repo-path-display" class="hidden path-text"></div>
            </div>

            <!-- Barra de Pestañas (Multi-Proyecto) -->
            <nav id="tabs-bar" class="tabs-bar hidden">
                <div id="tabs-container" class="tabs-container">
                    <!-- Tabs go here -->
                </div>
                <button id="add-tab-btn" class="add-tab-btn" title="Open Repository"><i class="fa-solid fa-plus"></i></button>
            </nav>

            <!-- Vista 2: Historial de Commits -->
            <div id="commits-view" class="hidden layout-split">
                <aside class="commits-sidebar" id="commits-sidebar">
                    <!-- Unified View -->
                    <div id="unified-view-container" class="sidebar-view">
                        <header class="repo-header">
                            <h2 id="active-repo-name">Repository</h2>
                            <div class="repo-actions">
                                <select id="branch-selector" class="glass-select"></select>
                                <button id="new-branch-btn" class="glass-btn" title="Create New Branch"><i class="fa-solid fa-plus"></i></button>

                            </div>
                        </header>

                        <!-- Staging View (Merged) -->
                        <div class="commit-box">
                            <textarea id="commit-message-input" class="commit-textarea" placeholder="Message (Cmd+Enter to commit)"></textarea>
                            <button id="commit-execute-btn" class="primary-btn commit-submit-btn">Commit</button>
                        </div>
                        
                        <div class="staging-accordion">
                            <h4 class="accordion-header">
                                <span class="accordion-title"><i class="fa-solid fa-chevron-down accordion-icon"></i> Staged Changes</span>
                                <span class="accordion-actions">
                                    <button id="unstage-all-btn" class="icon-btn" title="Unstage All"><i class="fa-solid fa-minus"></i></button>
                                </span>
                            </h4>
                            <div class="accordion-content">
                                <ul id="staged-files-list" class="file-list"></ul>
                            </div>
                        </div>
                        
                        <div class="staging-accordion">
                            <h4 class="accordion-header">
                                <span class="accordion-title"><i class="fa-solid fa-chevron-down accordion-icon"></i> Changes</span>
                                <span class="accordion-actions">
                                    <button id="stage-all-btn" class="icon-btn" title="Stage All"><i class="fa-solid fa-plus"></i></button>
                                </span>
                            </h4>
                            <div class="accordion-content">
                                <ul id="unstaged-files-list" class="file-list"></ul>
                            </div>
                        </div>

                        <!-- History View (Merged) -->
                        <div class="staging-accordion" style="margin-top: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 1rem; flex: 1; min-height: 0;">
                            <h4 class="accordion-header">
                                <span class="accordion-title"><i class="fa-solid fa-chevron-down accordion-icon"></i> Commits</span>
                            </h4>
                            <div class="accordion-content commits-table-container" style="position: relative;">
                                <canvas id="commit-graph-canvas" class="commit-graph-canvas"></canvas>
                                <ul class="minimalist-tree" id="commits-tbody">
                                    <!-- Commits renderizados irán aquí -->
                                </ul>
                            </div>
                        </div>
                    </div>
                </aside>
                <div class="resizer" id="sidebar-resizer"></div>
                <section class="commit-details-pane">
                    <button id="toggle-sidebar-btn" class="icon-btn" title="Toggle Sidebar"><i class="fa-solid fa-bars"></i></button>
                    <div id="commit-details-content" class="hidden">
                        <div class="commit-header">
                            <h3 id="detail-message"></h3>
                            <div class="commit-meta-row">
                                <span class="badge" id="detail-hash"></span>
                                <span id="detail-author"></span>
                                <span id="detail-date" class="text-muted"></span>
                            </div>
                        </div>
                        <div class="diff-layout">
                            <div class="diff-file-list" id="diff-file-list">
                                <!-- Changed files will be listed here -->
                            </div>
                            <div class="diff-viewer" id="diff-viewer">
                                <div class="diff-placeholder">Select a file to view its diff</div>
                            </div>
                        </div>
                    </div>
                    <p class="placeholder-text" id="details-placeholder">Select a commit to view details</p>
                </section>
            </div>
        </main>
    </div>

    <!-- Template 100% HTML para los commits (RNF05) -->
    <template id="commit-template">
        <li class="commit-row">
            <div class="commit-content">
                <div class="commit-message" data-field="message"></div>
                <div class="commit-meta">
                    <span class="commit-hash" data-field="hash"></span>
                    <span class="commit-author" data-field="author"></span>
                </div>
                <div class="commit-date" data-field="date"></div>
            </div>
        </li>
    </template>

    <!-- Template for Source Control Files -->
    <template id="staging-file-template">
        <li class="staging-file-row">
            <span class="file-status"></span>
            <span class="file-name"></span>
            <div class="file-actions">
                <button class="stage-toggle-btn icon-btn"></button>
            </div>
        </li>
    </template>

    <!-- Modal for New Branch -->
    <div id="branch-modal" class="modal hidden">
        <div class="modal-content" style="width: 400px;">
            <h3>Create New Branch</h3>
            <input type="text" id="branch-name-input" class="glass-select" style="width: 100%; margin-bottom: 1rem; padding: 0.5rem;" placeholder="Branch name...">
            <div style="text-align: right;">
                <button id="cancel-branch-btn" class="glass-btn" style="margin-right: 0.5rem;">Cancel</button>
                <button id="confirm-branch-btn" class="primary-btn">Create</button>
            </div>
        </div>
    </div>

    <!-- Script decoupled from the HTML structure -->
    <script src="../app.js"></script>
</body>
</html>
