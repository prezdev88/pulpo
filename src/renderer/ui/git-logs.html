<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulpo Git Logs</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: var(--surface-color);
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h2 { margin: 0; font-size: 1.2rem; }
        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .log-entry {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #888;
        }
        .log-command {
            font-family: monospace;
            background: #000;
            color: var(--accent-color);
            padding: 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            word-break: break-all;
        }
        .log-output {
            font-family: monospace;
            background: #000;
            color: #ccc;
            padding: 0.5rem;
            border-radius: 4px;
            white-space: pre-wrap;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-error {
            color: #f87171;
            margin-top: 0.5rem;
        }
        .clear-btn {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .clear-btn:hover {
            background: rgba(187, 134, 252, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h2>Git Execution Logs</h2>
        <button id="clear-btn" class="clear-btn">Clear Logs</button>
    </header>
    <div class="log-container" id="log-container">
        <!-- Logs will be appended here -->
    </div>

    <script src="../gitLogs.js"></script>
</body>
</html>
